# FinPulse Frontend CI/CD Pipeline
# Deploys to staging (develop branch) or production (main branch)
#
# Required GitHub Secrets:
# - AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# - VITE_* environment variables for each environment

name: Deploy Frontend

on:
  push:
    branches:
      - main      # Production deployment
      - develop   # Staging deployment
    paths:
      - 'finpulse-app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

defaults:
  run:
    working-directory: finpulse-app

jobs:
  # ============================================
  # Build and Test
  # ============================================
  build:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.event.inputs.environment }}" != "" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: finpulse-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build for staging
        if: steps.set-env.outputs.environment == 'staging'
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID_STAGING }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID_STAGING }}
          VITE_COGNITO_REGION: us-east-1
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_WHALE_ALERT_API_KEY: ${{ secrets.VITE_WHALE_ALERT_API_KEY }}
          VITE_ENABLE_LIVE_WHALE_DATA: true
          VITE_ENABLE_AI: true
          VITE_ENABLE_COMMUNITY: true
          VITE_ENABLE_NEWS: true
        run: npm run build

      - name: Build for production
        if: steps.set-env.outputs.environment == 'production'
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID_PROD }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID_PROD }}
          VITE_COGNITO_REGION: us-east-1
          VITE_COGNITO_DOMAIN: finpulse-auth-prod-v2.auth.us-east-1.amazoncognito.com
          VITE_OAUTH_REDIRECT_URI: https://finpulse.me/oauth/callback
          VITE_OAUTH_LOGOUT_URI: https://finpulse.me
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_TWITTER_BEARER_TOKEN: ${{ secrets.VITE_TWITTER_BEARER_TOKEN }}
          VITE_WHALE_ALERT_API_KEY: ${{ secrets.VITE_WHALE_ALERT_API_KEY }}
          VITE_ENABLE_LIVE_WHALE_DATA: true
          VITE_ENABLE_AI: true
          VITE_ENABLE_COMMUNITY: true
          VITE_ENABLE_NEWS: true
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ steps.set-env.outputs.environment }}
          path: finpulse-app/dist/
          retention-days: 7

      - name: Build summary
        run: |
          echo "## Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.set-env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Bundle sizes:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/*.js 2>/dev/null || echo "No JS bundles found"
          ls -lh dist/assets/*.js >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.environment == 'staging'
    environment: staging

    defaults:
      run:
        working-directory: .

    env:
      S3_BUCKET: finpulse-frontend-staging-383349724213
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_STAGING }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-staging
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://staging.finpulse.me (or S3 URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Deploy to Production (requires approval)
  # ============================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: needs.build.outputs.environment == 'production'
    environment: production  # Requires manual approval in GitHub

    defaults:
      run:
        working-directory: .

    env:
      S3_BUCKET: finpulse-frontend-prod-383349724213
      CLOUDFRONT_DISTRIBUTION_ID: E2Y4NTEFQ5LYOK

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build-production
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Smoke test production
        run: |
          echo "Waiting for CloudFront propagation..."
          sleep 30

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://finpulse.me)
          if [[ "$HTTP_STATUS" != "200" ]]; then
            echo "❌ Production smoke test failed! HTTP status: $HTTP_STATUS"
            exit 1
          fi
          echo "✅ Production is responding with HTTP 200"

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://finpulse.me" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
