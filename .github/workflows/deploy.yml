name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'finpulse-app/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  S3_BUCKET: finpulse-frontend-prod-383349724213
  CLOUDFRONT_DISTRIBUTION_ID: E2Y4NTEFQ5LYOK

defaults:
  run:
    working-directory: finpulse-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finpulse-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Build for production
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_PROD }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID_PROD }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID_PROD }}
          VITE_COGNITO_REGION: us-east-1
          VITE_COGNITO_DOMAIN: finpulse-auth-prod-v2.auth.us-east-1.amazoncognito.com
          VITE_OAUTH_REDIRECT_URI: https://finpulse.me/oauth/callback
          VITE_OAUTH_LOGOUT_URI: https://finpulse.me
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_TWITTER_BEARER_TOKEN: ${{ secrets.VITE_TWITTER_BEARER_TOKEN }}
          VITE_ENABLE_AI: true
          VITE_ENABLE_COMMUNITY: true
          VITE_ENABLE_NEWS: true
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://finpulse.me" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
