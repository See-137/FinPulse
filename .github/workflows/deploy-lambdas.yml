# FinPulse Lambda CI/CD Pipeline
# Comprehensive deployment with staging, testing, and rollback support
#
# Required GitHub Secrets:
# - AWS_ACCESS_KEY_ID: AWS access key for deployment
# - AWS_SECRET_ACCESS_KEY: AWS secret key for deployment
# - ALPACA_API_KEY: Alpaca Markets API key
# - ALPACA_API_SECRET: Alpaca Markets API secret

name: Deploy Lambdas

on:
  push:
    branches:
      - main      # Production deployment
      - develop   # Staging deployment
    paths:
      - 'finpulse-infra/lambda-code/**'
      - '.github/workflows/deploy-lambdas.yml'

  pull_request:
    branches: [main, develop]
    paths:
      - 'finpulse-infra/lambda-code/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod
      function:
        description: 'Lambda function to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - portfolio
          - market-data
          - news
          - fx
          - community
          - admin
          - ai
          - twitter

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'
  LAMBDA_CODE_PATH: finpulse-infra/lambda-code

jobs:
  # ============================================
  # JOB 1: Detect which functions changed
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.set-matrix.outputs.functions }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed functions
        id: set-matrix
        run: |
          FUNCTIONS='["auth","portfolio","market-data","news","fx","community","admin","ai","twitter"]'

          # If manual trigger with specific function
          if [[ "${{ github.event.inputs.function }}" != "" ]] && [[ "${{ github.event.inputs.function }}" != "all" ]]; then
            FUNCTIONS='["${{ github.event.inputs.function }}"]'
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "any_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # If manual trigger with "all"
          if [[ "${{ github.event.inputs.function }}" == "all" ]]; then
            echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
            echo "any_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-detect from git diff
          CHANGED_FUNCTIONS="[]"
          for func in auth portfolio market-data news fx community admin ai twitter; do
            if git diff --name-only HEAD~1 HEAD | grep -q "finpulse-infra/lambda-code/$func/"; then
              CHANGED_FUNCTIONS=$(echo $CHANGED_FUNCTIONS | jq -c ". + [\"$func\"]")
            fi
          done

          # Check shared folder - if changed, deploy all
          if git diff --name-only HEAD~1 HEAD | grep -q "finpulse-infra/lambda-code/shared/"; then
            CHANGED_FUNCTIONS=$FUNCTIONS
          fi

          if [[ "$CHANGED_FUNCTIONS" == "[]" ]]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

          echo "functions=$CHANGED_FUNCTIONS" >> $GITHUB_OUTPUT
          echo "Changed functions: $CHANGED_FUNCTIONS"

  # ============================================
  # JOB 2: Lint and Test
  # ============================================
  lint-and-test:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint Lambda code
        run: |
          cd ${{ env.LAMBDA_CODE_PATH }}
          for dir in */; do
            if [[ -f "${dir}index.js" ]]; then
              echo "Checking ${dir}..."
              node --check "${dir}index.js" || exit 1
            fi
          done
          echo "All Lambda code syntax is valid"

  # ============================================
  # JOB 3: Deploy to Staging
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: |
      needs.detect-changes.outputs.any_changed == 'true' &&
      (github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging')
    environment: staging

    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(needs.detect-changes.outputs.functions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd ${{ env.LAMBDA_CODE_PATH }}/${{ matrix.function }}
          if [[ -f "package.json" ]]; then
            npm ci --production
          fi
          if [[ -d "../shared" ]]; then
            cp -r ../shared ./shared 2>/dev/null || true
          fi

      - name: Package Lambda
        run: |
          cd ${{ env.LAMBDA_CODE_PATH }}/${{ matrix.function }}
          zip -r ../deploy-${{ matrix.function }}.zip . -x "*.git*" -x "*.md" -x "test/*"
          echo "Package size: $(du -h ../deploy-${{ matrix.function }}.zip | cut -f1)"

      - name: Deploy to Staging
        run: |
          FUNC_NAME="finpulse-${{ matrix.function }}-staging"

          aws lambda update-function-code \
            --function-name $FUNC_NAME \
            --zip-file fileb://${{ env.LAMBDA_CODE_PATH }}/deploy-${{ matrix.function }}.zip \
            --publish

          aws lambda wait function-updated --function-name $FUNC_NAME
          echo "Deployed ${{ matrix.function }} to staging"

  # ============================================
  # JOB 4: Deploy to Production
  # ============================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint-and-test]
    if: |
      needs.detect-changes.outputs.any_changed == 'true' &&
      (github.ref == 'refs/heads/main' || github.event.inputs.environment == 'prod')
    environment: production

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        function: ${{ fromJson(needs.detect-changes.outputs.functions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: |
          cd ${{ env.LAMBDA_CODE_PATH }}/${{ matrix.function }}
          if [[ -f "package.json" ]]; then
            npm ci --production
          fi
          if [[ -d "../shared" ]]; then
            cp -r ../shared ./shared 2>/dev/null || true
          fi

      - name: Package Lambda
        run: |
          cd ${{ env.LAMBDA_CODE_PATH }}/${{ matrix.function }}
          zip -r ../deploy-${{ matrix.function }}.zip . -x "*.git*" -x "*.md" -x "test/*"

          SIZE_BYTES=$(stat -c%s ../deploy-${{ matrix.function }}.zip 2>/dev/null || stat -f%z ../deploy-${{ matrix.function }}.zip)
          if [[ $SIZE_BYTES -lt 1000 ]]; then
            echo "Package too small ($SIZE_BYTES bytes) - likely missing dependencies!"
            exit 1
          fi

      - name: Deploy to Production
        id: deploy
        run: |
          FUNC_NAME="finpulse-${{ matrix.function }}-prod"

          aws lambda update-function-code \
            --function-name $FUNC_NAME \
            --zip-file fileb://${{ env.LAMBDA_CODE_PATH }}/deploy-${{ matrix.function }}.zip \
            --publish

          aws lambda wait function-updated --function-name $FUNC_NAME

          NEW_VERSION=$(aws lambda get-function --function-name $FUNC_NAME \
            --query 'Configuration.Version' --output text)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Deployed version $NEW_VERSION"

      - name: Production Smoke Test
        run: |
          FUNC_NAME="finpulse-${{ matrix.function }}-prod"

          aws lambda invoke \
            --function-name $FUNC_NAME \
            --payload '{"httpMethod":"OPTIONS","headers":{}}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/response.json

          RESPONSE=$(cat /tmp/response.json)

          if echo "$RESPONSE" | grep -qi "placeholder"; then
            echo "CRITICAL: Placeholder code in production!"
            exit 1
          fi

          if echo "$RESPONSE" | grep -q '"statusCode":5'; then
            echo "CRITICAL: 5xx error in production!"
            exit 1
          fi

          echo "Production smoke test passed"

      - name: Deployment summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Function | ${{ matrix.function }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.deploy.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # JOB 5: Post-deployment verification
  # ============================================
  verify-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'

    steps:
      - name: End-to-end API test
        run: |
          API_URL="https://b3fgmin9yj.execute-api.us-east-1.amazonaws.com/prod"

          echo "Testing public endpoints..."

          curl -sf "$API_URL/market/prices" | grep -q "BTC" && echo "Market prices OK" || echo "Market prices may have issues"
          curl -sf "$API_URL/fx/rates" | grep -q "EUR" && echo "FX rates OK" || echo "FX rates may have issues"

          echo "Deployment verification complete!"
