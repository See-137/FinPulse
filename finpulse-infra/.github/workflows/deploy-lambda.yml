name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'lambda-code/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Lambda function to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - auth
          - portfolio
          - market-data
          - news
          - fx
          - community
          - admin
          - ai

env:
  AWS_REGION: us-east-1

jobs:
  deploy-lambdas:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        function: [auth, portfolio, market-data, news, fx, community, admin, ai]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if function changed
        id: changes
        run: |
          if [[ "${{ github.event.inputs.function }}" == "all" ]] || [[ "${{ github.event.inputs.function }}" == "${{ matrix.function }}" ]]; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 | grep -q "lambda-code/${{ matrix.function }}/"; then
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Package Lambda
        if: steps.changes.outputs.deploy == 'true'
        run: |
          cd lambda-code/${{ matrix.function }}
          zip -r ../function.zip .

      - name: Deploy Lambda
        if: steps.changes.outputs.deploy == 'true'
        run: |
          FUNCTION_NAME="finpulse-${{ matrix.function }}-prod"
          # Handle market-data naming
          if [[ "${{ matrix.function }}" == "market-data" ]]; then
            FUNCTION_NAME="finpulse-market-prod"
          fi
          
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://lambda-code/function.zip \
            --publish

      - name: Deployment summary
        if: steps.changes.outputs.deploy == 'true'
        run: |
          echo "## 🚀 Lambda Deployed: ${{ matrix.function }}" >> $GITHUB_STEP_SUMMARY
