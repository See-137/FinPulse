# FinPulse Secrets Management Workflow
# Manages API credentials in AWS Secrets Manager via CI/CD
#
# Required GitHub Secrets:
# - AWS_ACCESS_KEY_ID: AWS access key
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - ALPACA_API_KEY: Alpaca Markets API key
# - ALPACA_API_SECRET: Alpaca Markets API secret

name: Manage Secrets

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - update-alpaca
          - verify-secrets
          - list-secrets
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - staging
          - prod

env:
  AWS_REGION: us-east-1

jobs:
  manage-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ============================================
      # Update Alpaca Credentials
      # ============================================
      - name: Update Alpaca credentials
        if: github.event.inputs.action == 'update-alpaca'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          SECRET_NAME="finpulse/${ENV}/alpaca-credentials"
          
          if [[ -z "${{ secrets.ALPACA_API_KEY }}" ]]; then
            echo "❌ ERROR: ALPACA_API_KEY secret is not set in GitHub"
            exit 1
          fi
          
          if [[ -z "${{ secrets.ALPACA_API_SECRET }}" ]]; then
            echo "❌ ERROR: ALPACA_API_SECRET secret is not set in GitHub"
            exit 1
          fi
          
          # Check if secret exists
          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" 2>/dev/null; then
            echo "📝 Updating existing secret: $SECRET_NAME"
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "{\"api_key\":\"${{ secrets.ALPACA_API_KEY }}\",\"api_secret\":\"${{ secrets.ALPACA_API_SECRET }}\"}"
          else
            echo "🆕 Creating new secret: $SECRET_NAME"
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Alpaca Markets API credentials for FinPulse ${ENV}" \
              --secret-string "{\"api_key\":\"${{ secrets.ALPACA_API_KEY }}\",\"api_secret\":\"${{ secrets.ALPACA_API_SECRET }}\"}"
          fi
          
          echo ""
          echo "✅ Alpaca credentials updated for ${ENV} environment"
          echo ""
          echo "## 🔐 Secret Updated" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Name | \`$SECRET_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENV |" >> $GITHUB_STEP_SUMMARY
          echo "| Updated by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY

      # ============================================
      # Verify Secrets Exist
      # ============================================
      - name: Verify secrets
        if: github.event.inputs.action == 'verify-secrets'
        run: |
          ENV="${{ github.event.inputs.environment }}"
          
          echo "🔍 Verifying secrets for ${ENV} environment..."
          echo ""
          
          SECRETS=(
            "finpulse/${ENV}/alpaca-credentials"
            "finpulse/${ENV}/gemini-api-key"
            "finpulse/${ENV}/gnews-api-key"
            "finpulse/${ENV}/newsapi-key"
          )
          
          echo "## 🔐 Secrets Status" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          
          for secret in "${SECRETS[@]}"; do
            if aws secretsmanager describe-secret --secret-id "$secret" 2>/dev/null; then
              echo "✅ $secret - EXISTS"
              echo "| \`$secret\` | ✅ Exists |" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $secret - MISSING"
              echo "| \`$secret\` | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          
          # Check deprecated secrets
          echo ""
          echo "📋 Deprecated secrets (can be deleted):"
          DEPRECATED=(
            "finpulse/${ENV}/coingecko-api-key"
            "finpulse/${ENV}/alphavantage-api-key"
            "finpulse/${ENV}/exchangerate-api-key"
          )
          
          for secret in "${DEPRECATED[@]}"; do
            if aws secretsmanager describe-secret --secret-id "$secret" 2>/dev/null; then
              echo "⚠️ $secret - EXISTS (deprecated, can be deleted)"
            fi
          done

      # ============================================
      # List All Secrets
      # ============================================
      - name: List secrets
        if: github.event.inputs.action == 'list-secrets'
        run: |
          echo "📋 All FinPulse secrets in AWS Secrets Manager:"
          echo ""
          
          aws secretsmanager list-secrets \
            --filters Key=name,Values=finpulse \
            --query 'SecretList[*].[Name,Description,LastChangedDate]' \
            --output table
          
          echo ""
          echo "## 📋 All Secrets" >> $GITHUB_STEP_SUMMARY
          aws secretsmanager list-secrets \
            --filters Key=name,Values=finpulse \
            --query 'SecretList[*].Name' \
            --output text | tr '\t' '\n' | while read secret; do
              echo "- \`$secret\`" >> $GITHUB_STEP_SUMMARY
            done
